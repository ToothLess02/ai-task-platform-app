name: CI/CD Pipeline - Build, Test & GitOps Update

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Backend Syntax & Integrity
        run: |
          cd app/backend
          npm ci --only=production || true

      - name: Verify Frontend Syntax & Build Setup
        run: |
          cd app/frontend
          npm ci || true

  build-and-push:
    name: Build & Push Docker Images
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: vars
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ env.SHA_SHORT }}

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/worker
          file: ./app/worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ env.SHA_SHORT }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ env.SHA_SHORT }}

  update-gitops-infra:
    name: GitOps Image Tag Update
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.GITOPS_PAT != '' }}
    steps:
      - name: Checkout Infrastructure Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ai-task-platform-infra
          token: ${{ secrets.GITOPS_PAT }}
          path: infra-repo

      - name: Update Kubernetes Manifest Tags
        run: |
          cd infra-repo/k8s
          sed -i 's|image: .*/ai-task-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-backend:${{ env.SHA_SHORT }}|g' backend-deployment.yaml
          sed -i 's|image: .*/ai-task-worker:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-worker:${{ env.SHA_SHORT }}|g' worker-deployment.yaml
          sed -i 's|image: .*/ai-task-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/ai-task-frontend:${{ env.SHA_SHORT }}|g' frontend-deployment.yaml

      - name: Commit and Push Manifest Updates to GitOps Repo
        run: |
          cd infra-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "ci(gitops): auto-update image tags to SHA ${{ env.SHA_SHORT }}"
          git push origin main
